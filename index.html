<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Pf</title>
      <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="cabeçario">

        <ul>
            <img src="tourpf.png" alt="logo" width="80px">
            <img class="nós-icon" src="nós.png" alt="hotel" width="30px">
            <li><a href="nós.html">Quem somos nós?</a></li>
            <img class="cachoeira-icon" src="cachoeira.png" alt="hotel" width="40px">

            <li><a href="eventos.html">Eventos</a></li>

    <div class="carrossel">
